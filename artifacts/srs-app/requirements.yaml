packages:
  "recharts": "Used for the retention and progress charts in both teacher and student dashboards"
  "framer-motion": "Used for the interactive flashcard flip animations and smooth page transitions"
  "date-fns": "Used for formatting review dates and relative times"
  "clsx": "Utility for conditional class names"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For robust form state management"
  "zod": "For defining frontend form schemas"

images:
  - path: "artifacts/srs-app/public/images/auth-bg.png"
    description: "Abstract, calm, deep teal and slate blue gradient mesh, subtle frosted glass effect, very minimal and professional for an educational platform background"
    aspect_ratio: "16:9"
  - path: "artifacts/srs-app/public/images/empty-state.png"
    description: "A minimal 3D illustration of a neat stack of flashcards with a small potted plant next to it, soft lighting, light slate background, conveying a sense of organized learning"
    aspect_ratio: "4:3"

notes:
  - "Assuming @workspace/api-client-react is built and exports all the generated React Query hooks as expected."
  - "The app uses a mock role switcher (Teacher ID 1, Student ID 2) for demonstration without a real auth backend."
