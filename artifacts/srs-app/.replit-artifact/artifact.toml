kind = "web"
previewPath = "/"
title = "MetaSRS Learning Platform"
version = "1.0.0"
id = "artifacts/srs-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24140

[services.development]
run = "pnpm --filter @workspace/srs-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/srs-app", "run", "build" ]
publicDir = "artifacts/srs-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24140"
BASE_PATH = "/"
