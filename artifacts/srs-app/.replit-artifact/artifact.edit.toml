kind = "web"
  previewPath = "/"
  title = "Vocabulous - SRS Learning Platform"
  version = "1.0.0"
  id = "srs-app-vocabulous"

  [[services]]
  localPort = 5173
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm --filter @workspace/srs-app run dev"

  [services.production]
  build = ["pnpm", "--filter", "@workspace/srs-app", "run", "build"]
  