openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MetaSRS Learning Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: classes
    description: Class management
  - name: decks
    description: Card deck management
  - name: cards
    description: Flashcard management
  - name: reviews
    description: Student review sessions
  - name: analytics
    description: Analytics and insights

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ─────────────────────────────────────────────────────────────────────
  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account and get a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: Account created; JWT cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and get a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in; JWT cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out and clear the session cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok

  # ─── Users ───────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─── Classes ─────────────────────────────────────────────────────────────────
  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List all classes
      parameters:
        - name: teacherId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Created class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /classes/{id}:
    get:
      operationId: getClass
      tags: [classes]
      summary: Get a class by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClass
      tags: [classes]
      summary: Update a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassBody"
      responses:
        "200":
          description: Updated class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /classes/{id}/enroll:
    post:
      operationId: enrollStudent
      tags: [classes]
      summary: Enroll a student in a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollStudentBody"
      responses:
        "201":
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /classes/{id}/students:
    get:
      operationId: listClassStudents
      tags: [classes]
      summary: List students enrolled in a class
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of enrolled students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentEnrollment"

  /students/{studentId}/classes:
    get:
      operationId: listStudentClasses
      tags: [classes]
      summary: List classes a student is enrolled in
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"

  # ─── Decks ───────────────────────────────────────────────────────────────────
  /decks:
    get:
      operationId: listDecks
      tags: [decks]
      summary: List decks
      parameters:
        - name: classId
          in: query
          required: false
          schema:
            type: integer
        - name: teacherId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of decks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deck"
    post:
      operationId: createDeck
      tags: [decks]
      summary: Create a deck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeckBody"
      responses:
        "201":
          description: Created deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"

  /decks/{id}:
    get:
      operationId: getDeck
      tags: [decks]
      summary: Get a deck by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDeck
      tags: [decks]
      summary: Update a deck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeckBody"
      responses:
        "200":
          description: Updated deck
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
    delete:
      operationId: deleteDeck
      tags: [decks]
      summary: Delete a deck
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Cards ────────────────────────────────────────────────────────────────────
  /decks/{deckId}/cards:
    get:
      operationId: listCards
      tags: [cards]
      summary: List cards in a deck
      parameters:
        - name: deckId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
    post:
      operationId: createCard
      tags: [cards]
      summary: Create a card in a deck
      parameters:
        - name: deckId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCardBody"
      responses:
        "201":
          description: Created card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"

  /cards/{id}:
    get:
      operationId: getCard
      tags: [cards]
      summary: Get a card by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCard
      tags: [cards]
      summary: Update a card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCardBody"
      responses:
        "200":
          description: Updated card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
    delete:
      operationId: deleteCard
      tags: [cards]
      summary: Delete a card
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── Reviews ─────────────────────────────────────────────────────────────────
  /reviews:
    post:
      operationId: submitReview
      tags: [reviews]
      summary: Submit a card review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /students/{studentId}/due-cards:
    get:
      operationId: getDueCards
      tags: [reviews]
      summary: Get cards due for review for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: deckId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Due cards with SRS state
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DueCard"

  /students/{studentId}/reviews:
    get:
      operationId: listStudentReviews
      tags: [reviews]
      summary: List review history for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: deckId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Review history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /students/{studentId}/research-decks:
    get:
      operationId: getStudentResearchDecks
      tags: [reviews]
      summary: Get all decks from classes the student is enrolled in (research mode)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: mastery
          in: query
          required: false
          schema:
            type: string
            enum: [new, learning, mastered]
      responses:
        "200":
          description: Research decks with mastery info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResearchDeck"

  # ─── Analytics ───────────────────────────────────────────────────────────────
  /analytics/teacher/{teacherId}:
    get:
      operationId: getTeacherAnalytics
      tags: [analytics]
      summary: Get teacher-level analytics across all classes
      parameters:
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teacher analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherAnalytics"

  /analytics/class/{classId}:
    get:
      operationId: getClassAnalytics
      tags: [analytics]
      summary: Get analytics for a specific class
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassAnalytics"

  /analytics/student/{studentId}:
    get:
      operationId: getStudentAnalytics
      tags: [analytics]
      summary: Get analytics for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentAnalytics"

  /analytics/class/{classId}/at-risk:
    get:
      operationId: getAtRiskStudents
      tags: [analytics]
      summary: Get students showing memory slippage or at risk
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: At-risk students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtRiskStudent"

  /students/{studentId}/persona:
    get:
      operationId: getStudentPersona
      tags: [analytics]
      summary: Get or generate AI learning persona for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI learning persona
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentPersona"

  /students/{studentId}/study-time:
    get:
      operationId: getStudentStudyTime
      tags: [analytics]
      summary: Get total study time for the current ISO week
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Study time this week
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentStudyTime"

  /students/{studentId}/knowledge-graph:
    get:
      operationId: getStudentKnowledgeGraph
      tags: [analytics]
      summary: Get knowledge graph grouped by tag for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Knowledge graph by tag
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeGraphTag"

  /analytics/teacher/{teacherId}/students:
    get:
      operationId: getTeacherStudents
      tags: [analytics]
      summary: Get all students across all teacher classes with risk and retention data
      parameters:
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Teacher-wide student list with risk indicators
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeacherStudentRow"

  /analytics/students/{studentId}/detail:
    get:
      operationId: getStudentDetail
      tags: [analytics]
      summary: Get detailed analytics for a student (teacher view)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
        - name: teacherId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Student detail including retention trend, deck progress, recent reviews, and at-risk flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentDetail"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── Auth ──────────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [teacher, student]
      required:
        - id
        - name
        - email
        - role

    SignupBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [teacher, student]
      required:
        - name
        - email
        - password
        - role

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    # ─── Users ─────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [teacher, student]
        googleId:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        streakCount:
          type: integer
        lastStudyDate:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - streakCount
        - createdAt

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [teacher, student]
        googleId:
          type: string
        avatarUrl:
          type: string
      required:
        - name
        - email
        - role

    # ─── Classes ───────────────────────────────────────────────────────────────
    Class:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        subject:
          type: string
        teacherId:
          type: integer
        teacherName:
          type: ["string", "null"]
        enrollmentCount:
          type: integer
        deckCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - subject
        - teacherId
        - enrollmentCount
        - deckCount
        - createdAt

    CreateClassBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        subject:
          type: string
        teacherId:
          type: integer
      required:
        - name
        - subject
        - teacherId

    UpdateClassBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        subject:
          type: string

    Enrollment:
      type: object
      properties:
        id:
          type: integer
        classId:
          type: integer
        studentId:
          type: integer
        enrolledAt:
          type: string
          format: date-time
      required:
        - id
        - classId
        - studentId
        - enrolledAt

    EnrollStudentBody:
      type: object
      properties:
        studentId:
          type: integer
      required:
        - studentId

    StudentEnrollment:
      type: object
      properties:
        studentId:
          type: integer
        studentName:
          type: string
        studentEmail:
          type: string
        enrolledAt:
          type: string
          format: date-time
        totalReviews:
          type: integer
        averageRetention:
          type: ["number", "null"]
        lastReviewedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - studentId
        - studentName
        - studentEmail
        - enrolledAt
        - totalReviews

    # ─── Decks ─────────────────────────────────────────────────────────────────
    Deck:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        classId:
          type: ["integer", "null"]
        teacherId:
          type: integer
        cardCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - teacherId
        - cardCount
        - createdAt
        - updatedAt

    CreateDeckBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        classId:
          type: integer
        teacherId:
          type: integer
      required:
        - name
        - teacherId

    UpdateDeckBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        classId:
          type: integer

    # ─── Cards ─────────────────────────────────────────────────────────────────
    Card:
      type: object
      properties:
        id:
          type: integer
        deckId:
          type: integer
        createdBy:
          type: ["integer", "null"]
        front:
          type: string
        back:
          type: string
        hint:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        cardType:
          type: string
          enum: [flashcard, multiple_choice, brain_dump]
        imageUrl:
          type: ["string", "null"]
        mcOptions:
          type: ["array", "null"]
          items:
            type: string
        mcCorrectIndex:
          type: ["integer", "null"]
        importance:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - deckId
        - front
        - back
        - tags
        - cardType
        - importance
        - createdAt
        - updatedAt

    CreateCardBody:
      type: object
      properties:
        front:
          type: string
